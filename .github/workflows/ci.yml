name: CI
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  verify:
    name: verify (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      # Install Deno so the Deno runScript tests RUN (not skip) on both Node matrix runners.
      # Pinned to commit SHA per security policy for third-party actions.
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: "2.x"
      # Install bubblewrap on Linux so the bubblewrap tests RUN on the ubuntu runner.
      - name: Install bubblewrap
        run: sudo apt-get update -qq && sudo apt-get install -y bubblewrap
      # Ubuntu 24.04 (noble) ships kernel.apparmor_restrict_unprivileged_userns=1,
      # which blocks unprivileged user namespaces — bwrap's userns probe would fail
      # and the bubblewrap tests would SKIP instead of RUN. Relax it so the bwrap
      # path is genuinely exercised in CI (the only place we have a Linux box).
      - name: Enable unprivileged user namespaces (for bubblewrap)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      # Regression guard: assert the bwrap userns probe succeeds, so the
      # bubblewrap tests can never silently go back to skipping. Mirrors
      # probeUserns() in bubblewrap.ts (real /usr/bin/true under a bound path).
      - name: Verify bubblewrap is usable
        run: bwrap --ro-bind /usr /usr --ro-bind /bin /bin --ro-bind-try /lib /lib --ro-bind-try /lib64 /lib64 -- /usr/bin/true
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
  web-build:
    name: web build + bundle-leak check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      # Build ALL of web's workspace lib dependencies first (core, openapi-client,
      # graphql-client, platform-orchestration — Rolldown must resolve each ssr.external
      # workspace dist during the SSR build; a missing one fails with "failed to resolve
      # import"). `{@junction/web}^...` = "the dependencies of web, excluding web itself".
      # Then web, leak-check, smoke, tests, typecheck — via the SAME scripts `verify:web`
      # runs locally, so CI and the local loop can't diverge (the inc-23 trap).
      - run: pnpm --filter "{packages/web}^..." build
      - run: pnpm --filter @junction/web build
      - run: pnpm run web:leakcheck # existence guard + negative + positive control
      - run: pnpm run web:smoke # boots serve.mjs, asserts styled/SSR-correct/leak-free responses
      - run: pnpm --filter @junction/web test
      - run: pnpm --filter @junction/web typecheck
      # react-doctor — on-demand React audit, run per-PR on the changed web code.
      # Reports findings (does not fail the build): triage is the orchestrator's job
      # per docs/rules/web.md. Surfaces AI-React code smells (forwardRef, layout-prop
      # animation, mount-effect state, dead exports) on every web PR.
      - name: react-doctor (web, report-only)
        run: npx --yes react-doctor@latest --no-score --scope changed --base origin/main packages/web || true
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm run quality
