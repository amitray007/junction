name: CI
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  verify:
    name: verify (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      # Install Deno so the Deno runScript tests RUN (not skip) on both Node matrix runners.
      # Pinned to commit SHA per security policy for third-party actions.
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: "2.x"
      # Install bubblewrap on Linux so the bubblewrap tests RUN on the ubuntu runner.
      - name: Install bubblewrap
        run: sudo apt-get update -qq && sudo apt-get install -y bubblewrap
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm run quality
