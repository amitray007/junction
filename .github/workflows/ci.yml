name: CI
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  verify:
    name: verify (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      # Install Deno so the Deno runScript tests RUN (not skip) on both Node matrix runners.
      # Pinned to commit SHA per security policy for third-party actions.
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: "2.x"
      # Install bubblewrap on Linux so the bubblewrap tests RUN on the ubuntu runner.
      - name: Install bubblewrap
        run: sudo apt-get update -qq && sudo apt-get install -y bubblewrap
      # Ubuntu 24.04 (noble) ships kernel.apparmor_restrict_unprivileged_userns=1,
      # which blocks unprivileged user namespaces — bwrap's userns probe would fail
      # and the bubblewrap tests would SKIP instead of RUN. Relax it so the bwrap
      # path is genuinely exercised in CI (the only place we have a Linux box).
      - name: Enable unprivileged user namespaces (for bubblewrap)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      # Regression guard: assert the bwrap userns probe succeeds, so the
      # bubblewrap tests can never silently go back to skipping. Mirrors
      # probeUserns() in bubblewrap.ts (real /usr/bin/true under a bound path).
      - name: Verify bubblewrap is usable
        run: bwrap --ro-bind /usr /usr --ro-bind /bin /bin --ro-bind-try /lib /lib --ro-bind-try /lib64 /lib64 -- /usr/bin/true
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
  web-build:
    name: web build + bundle-leak check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      # Build the web package (SSR + client bundles).
      # A planted @junction/core import in a client-reachable module will fail
      # here (Vite can't bundle the native better-sqlite3 / @napi-rs/keyring deps).
      - run: pnpm --filter @junction/web build
      # Client-bundle leak grep — three-part check:
      # 1. Existence guard: dist/client/assets must be non-empty (proves we scanned real output)
      # 2. Negative check: none of the server-only / secret-payload identifiers appear
      # 3. Positive control: a known client-bundle string IS present (proves grep scanned content)
      - name: Client-bundle leak grep
        run: |
          # 1. Existence guard — catch an empty/missing dist that would make grep trivially pass.
          if [ -z "$(ls -A packages/web/dist/client/assets 2>/dev/null)" ]; then
            echo "ERROR: packages/web/dist/client/assets is empty or missing after build"
            exit 1
          fi
          # 2. Negative check — server-only identifiers and secret payload markers must not appear.
          LEAKS=$(grep -rl \
            "better-sqlite3\|napi-rs/keyring\|@junction/core\|CREATE TABLE\|drizzle\|secretRef\|secret_ref" \
            packages/web/dist/client 2>/dev/null || true)
          if [ -n "$LEAKS" ]; then
            echo "ERROR: server-only or secret-payload identifiers found in client bundle:"
            echo "$LEAKS"
            exit 1
          fi
          # 3. Positive control — a string known to be in every client bundle must be present.
          #    If this fails, the bundle is empty/corrupt or the grep target changed.
          if ! grep -rl "createFileRoute" packages/web/dist/client > /dev/null 2>&1; then
            echo "ERROR: positive control failed — 'createFileRoute' not found in client bundle."
            echo "Either the bundle is empty/corrupt or the grep target dir is wrong."
            exit 1
          fi
          echo "OK: dist/client/assets non-empty, no server-only identifiers, positive control passed"
      # Run web component tests (happy-dom environment, separate vitest config).
      - run: pnpm --filter @junction/web test
      # Run web typecheck (tsr generate + tsc --noEmit).
      - run: pnpm --filter @junction/web typecheck
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm run quality
