name: CI
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  verify:
    name: verify (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      # Install Deno so the Deno runScript tests RUN (not skip) on both Node matrix runners.
      # Pinned to commit SHA per security policy for third-party actions.
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: "2.x"
      # Install bubblewrap on Linux so the bubblewrap tests RUN on the ubuntu runner.
      - name: Install bubblewrap
        run: sudo apt-get update -qq && sudo apt-get install -y bubblewrap
      # Ubuntu 24.04 (noble) ships kernel.apparmor_restrict_unprivileged_userns=1,
      # which blocks unprivileged user namespaces — bwrap's userns probe would fail
      # and the bubblewrap tests would SKIP instead of RUN. Relax it so the bwrap
      # path is genuinely exercised in CI (the only place we have a Linux box).
      - name: Enable unprivileged user namespaces (for bubblewrap)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - name: Diagnose bubblewrap userns probe
        run: |
          echo "restrict_unpriv_userns=$(cat /proc/sys/kernel/apparmor_restrict_unprivileged_userns 2>/dev/null || echo missing)"
          echo "unpriv_userns_clone=$(cat /proc/sys/kernel/unprivileged_userns_clone 2>/dev/null || echo missing)"
          echo "max_user_ns=$(cat /proc/sys/user/max_user_namespaces 2>/dev/null || echo missing)"
          echo "--- probe (mirrors probeUserns) ---"
          bwrap --ro-bind /usr /usr -- /bin/true; echo "probe1 exit=$?"
          echo "--- probe with explicit unshare-user ---"
          bwrap --unshare-user --ro-bind /usr /usr -- /bin/true; echo "probe2 exit=$?"
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm run quality
