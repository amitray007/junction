name: Bug report
description: Report a bug in junction
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        **Security vulnerability?** Do not open a public issue.
        Use [GitHub Private Security Advisories](https://github.com/amitray007/junction/security/advisories/new)
        or read [SECURITY.md](https://github.com/amitray007/junction/blob/main/SECURITY.md).

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `junction ...`
        2. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `junction --version` or the git commit hash.
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: "OS, Node version (e.g. macOS 14, Node 22.3)"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: |
        Paste any relevant logs here. **Redact all credentials, tokens, and secrets
        before submitting — use placeholders like `<REDACTED>`.**
      render: shell
