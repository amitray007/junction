name: Feature request
description: Suggest an improvement or new capability for junction
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Junction is in active foundation development. Feature requests are welcome — note that
        post-foundation features will be prioritized after the core increments (0–9) complete.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain or gap you are experiencing.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like junction to do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you have thought about or tried.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that would help (links, screenshots, examples).
