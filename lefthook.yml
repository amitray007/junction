# Lefthook — git hooks for junction.
# Install once with: pnpm exec lefthook install

pre-commit:
  parallel: false
  commands:
    # Fast formatter/lint pass on staged files (auto-fixes, re-stages).
    biome:
      glob: "*.{ts,tsx,js,jsx,json}"
      run: pnpm exec biome check --write {staged_files} && git add {staged_files}
    # The real gate: full verify (typecheck + lint + tests). Blocks on failure.
    verify:
      run: pnpm run verify
    # Version consistency check (fast).
    syncpack:
      run: pnpm run syncpack:check

pre-push:
  commands:
    verify:
      run: pnpm run verify
    # Boundary check (slower — pre-push only).
    depcruise:
      run: pnpm run depcruise
    # Duplication check — mirrors CI's `quality` job so jscpd over-threshold fails
    # locally, not only in CI. (`pnpm verify` does NOT run this; the gap let a
    # duplication regression reach CI in inc 23 and inc 24 — closed here.)
    dup:
      run: pnpm run dup
    syncpack:
      run: pnpm run syncpack:check
